<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Charging Analytics</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --tesla-red: #e82127;
            --bg-dark: #111111;
            --card-bg: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #2c2c2e;
            --border: #3a3a3c;
            --success: #30d158;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--accent);
        }
        header h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
        header h1 span { color: var(--tesla-red); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border); text-align: center;
        }
        .stat-card i { color: var(--tesla-red); margin-bottom: 10px; font-size: 1.2rem; }
        .stat-card h3 { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .stat-card p { font-size: 1.4rem; font-weight: bold; }

        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 25px;
            border: 1px solid var(--border); margin-bottom: 25px;
        }
        .card-title { font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #fff; }
        .card-title i { color: var(--tesla-red); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .form-group input {
            width: 100%; background: var(--bg-dark); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 8px; outline: none;
        }
        .form-group input:focus { border-color: var(--tesla-red); }

        button {
            width: 100%; background: var(--tesla-red); color: white; border: none;
            padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); }

        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 600px;}
        th { text-align: left; color: var(--text-secondary); padding: 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 15px 12px; border-bottom: 1px solid var(--accent); white-space: nowrap;}
        .red-text { color: var(--tesla-red); font-weight: bold; }
        .delete-btn { width: auto; padding: 5px 10px; background: transparent; border: 1px solid var(--tesla-red); color: var(--tesla-red); font-size: 0.75rem; }
        .delete-btn:hover { background: var(--tesla-red); color: white; }

        canvas { max-height: 300px; width: 100% !important; }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000; display: none;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--tesla-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top: 15px;">數據高度同步中...</p>
</div>

<div class="container">
    <header>
        <h1>Tesla <span>Charge</span> Hub</h1>
        <div id="syncStatus" style="font-size: 0.8rem; color: var(--success);">● 雲端雙向同步正常</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><i class="fa-solid fa-road"></i><h3>總行駛里程</h3><p id="totalDist">0 km</p></div>
        <div class="stat-card"><i class="fa-solid fa-bolt"></i><h3>平均耗能</h3><p id="avgEff">0.000 <small>kWh/km</small></p></div>
        <div class="stat-card"><i class="fa-solid fa-hand-holding-dollar"></i><h3>總充電支出</h3><p id="totalSpend">$0</p></div>
        <div class="stat-card"><i class="fa-solid fa-coins"></i><h3>每公里成本</h3><p id="avgCost">$0.00</p></div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-plus-circle"></i> 新增紀錄</div>
                <form id="chargeForm">
                    <div class="form-group"><label>紀錄日期</label><input type="date" id="date" required></div>
                    <div class="form-group"><label>當前總里程 (km)</label><input type="number" id="odometer" placeholder="例如 全新車輸入: 0" required></div>
                    <div class="form-group"><label>充入電量 (kWh)</label><input type="number" id="kwh" step="0.1" placeholder="例如 交車當天輸入: 0" required></div>
                    <div class="form-group"><label>增加百分比 (%)</label><input type="number" id="percent" placeholder="例如 交車當天輸入: 0" required></div>
                    <div class="form-group"><label>充電費用 ($)</label><input type="number" id="cost" step="0.1" placeholder="例如 交車當天輸入: 0" required></div>
                    <button type="submit">確認儲存</button>
                </form>
            </div>
            <div class="card"><div class="card-title"><i class="fa-solid fa-chart-line"></i> 耗能效率趨勢</div><canvas id="effChart"></canvas></div>
        </div>
        <div class="right-col">
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-calendar-days"></i> 🗂️ 月度數據摘要統計</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>月份</th>
                                <th>月度行駛里程</th>
                                <th>月度總支出</th>
                                <th>月度平均耗能</th>
                                <th>每公里成本</th>
                            </tr>
                        </thead>
                        <tbody id="monthlyTableBody">
                            <tr><td colspan="5" style="text-align:center;color:var(--text-secondary);">等待數據載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card" style="min-height: 400px;">
                <div class="card-title"><i class="fa-solid fa-history"></i> 歷史紀錄明細</div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>日期</th><th>總里程</th><th>區間里程</th><th>電量</th><th>費用</th><th>kWh/km</th><th>$/km</th><th>操作</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ 請在此處填入您重新部署後取得的最新 Web App URL
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzyirzmzfWCoDtVBR5Jsf0Bxe6dVXI7AM8IXpZ-QhXW7ztipPDDoNYatfvfbRyX8Z5E/exec';
    
    let records = [];
    let effChartInstance = null;

    document.getElementById('date').valueAsDate = new Date();

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    function cleanFrontendNum(val) {
        if (typeof val === 'number') return val;
        if (!val && val !== 0) return 0;
        let cleaned = String(val).replace(/[^0-9.-]/g, '');
        let num = parseFloat(cleaned);
        return isNaN(num) ? 0 : num;
    }

    async function fetchRecords() {
        if (!WEB_APP_URL.startsWith('http')) return;
        showLoading(true);
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            // 🔥 解放 0 公里限制：修改 filter 防禦機制，允許 odometer === 0 通過（全新車起步點）
            records = data.map(r => ({
                id: String(r.id),
                date: r.date ? String(r.date).trim() : "",
                odometer: cleanFrontendNum(r.odometer),
                kwh: cleanFrontendNum(r.kwh),
                percent: cleanFrontendNum(r.percent),
                cost: cleanFrontendNum(r.cost)
            })).filter(r => r.date !== "" && r.id !== "");
               
            updateDashboard();
        } catch (e) { console.error("同步失敗:", e); }
        showLoading(false);
    }

    async function sendData(payload) {
        showLoading(true);
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            setTimeout(fetchRecords, 1500);
        } catch (e) { console.error("發送失敗:", e); showLoading(false); }
    }

    document.getElementById('chargeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        sendData({
            action: 'add', id: Date.now(),
            date: document.getElementById('date').value,
            odometer: parseFloat(document.getElementById('odometer').value),
            kwh: parseFloat(document.getElementById('kwh').value),
            percent: parseFloat(document.getElementById('percent').value),
            cost: parseFloat(document.getElementById('cost').value)
        });
        this.reset(); document.getElementById('date').valueAsDate = new Date();
    });

    function deleteRecord(id) { if(confirm('確定要刪除此筆充電紀錄？')) sendData({ action: 'delete', id: id }); }

    function updateDashboard() {
        const tbody = document.getElementById('tableBody'); 
        const monthlyTbody = document.getElementById('monthlyTableBody');
        tbody.innerHTML = '';
        monthlyTbody.innerHTML = '';
        
        // 依里程從小到大排序（舊到新排列，以利鏈條式精算落差）
        records.sort((a, b) => a.odometer - b.odometer);

        let totalKwhForEff = 0;
        let totalCostForEff = 0;
        let monthlyGroup = {}; // 用於統計每月數據

        // 核心鏈條式計算引擎
        for (let i = 0; i < records.length; i++) {
            let r = records[i];
            
            // 初始化月度物件格式
            let monthKey = r.date ? r.date.substring(0, 7) : "未知月份";
            if (r.date && !monthlyGroup[monthKey]) {
                monthlyGroup[monthKey] = { dist: 0, kwh: 0, cost: 0 };
            }

            if (i > 0) {
                let prev = records[i - 1];
                r.dist = r.odometer - prev.odometer; 
                if (r.dist > 0) {
                    r.kwhKm = r.kwh / r.dist;  
                    r.costKm = r.cost / r.dist; 
                    totalKwhForEff += r.kwh;
                    totalCostForEff += r.cost;
                    
                    // 歸納到對應的月份統計中
                    if (monthlyGroup[monthKey]) {
                        monthlyGroup[monthKey].dist += r.dist;
                        monthlyGroup[monthKey].kwh += r.kwh;
                    }
                } else {
                    r.dist = 0; r.kwhKm = 0; r.costKm = 0;
                }
            } else {
                // 第一筆資料（例如全新車 0 公里錨定點）
                r.dist = 0; r.kwhKm = 0; r.costKm = 0; 
            }
            
            // 每月的充電費用無論如何都無條件計入當月總支出
            if (monthlyGroup[monthKey]) {
                monthlyGroup[monthKey].cost += r.cost;
            }
        }

        // 計算全域生涯總里程 (最後一筆減去第一筆里程錨定點)
        let totalDistance = 0;
        if (records.length > 1) {
            totalDistance = records[records.length - 1].odometer - records[0].odometer;
        }

        // 全球生涯總充電支出累加
        let totalSpend = records.reduce((sum, r) => sum + r.cost, 0);

        // 1. 渲染歷史明細明細（最新數據排在最上面）
        const displayRecords = [...records].reverse();
        displayRecords.forEach((r) => {
            let distText = r.dist > 0 ? r.dist.toLocaleString() + ' km' : (r.odometer === 0 ? '交車錨定' : '-');
            tbody.innerHTML += `<tr>
                <td>${r.date}</td>
                <td>${r.odometer.toLocaleString()} km</td>
                <td class="red-text">${distText}</td>
                <td>${r.kwh} kWh</td>
                <td>$${r.cost.toLocaleString()}</td>
                <td>${r.kwhKm > 0 ? r.kwhKm.toFixed(3) : '-'}</td>
                <td>${r.costKm > 0 ? '$' + r.costKm.toFixed(2) : '-'}</td>
                <td><button class="delete-btn" onclick="deleteRecord('${r.id}')">刪除</button></td>
            </tr>`;
        });

        // 2. 渲染全新追加的「月度數據摘要統計」表格 (依月份由新到舊排序)
        let sortedMonths = Object.keys(monthlyGroup).sort((a, b) => b.localeCompare(a));
        if (sortedMonths.length === 0) {
            monthlyTbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-secondary);">暫無月度統計數據</td></tr>`;
        } else {
            sortedMonths.forEach(m => {
                let mData = monthlyGroup[m];
                let mAvgEff = mData.dist > 0 ? (mData.kwh / mData.dist).toFixed(3) + " <small>kWh/km</small>" : "-";
                let mAvgCost = mData.dist > 0 ? "$" + (mData.cost / mData.dist).toFixed(2) : "-";
                
                monthlyTbody.innerHTML += `<tr>
                    <td><strong>${m}</strong></td>
                    <td>${mData.dist.toLocaleString()} km</td>
                    <td class="red-text">$${mData.cost.toLocaleString(undefined, {maximumFractionDigits:1})}</td>
                    <td>${mAvgEff}</td>
                    <td>${mAvgCost}</td>
                </tr>`;
            });
        }

        // 3. 渲染上方四大生涯數據大字卡
        document.getElementById('totalDist').innerText = totalDistance.toLocaleString() + " km";
        document.getElementById('totalSpend').innerText = "$" + totalSpend.toLocaleString(undefined, {maximumFractionDigits:1});

        // 數學安全閥：如果只有 1 筆數據（即只有交車 0 公里紀錄），不執行除法
        if (records.length <= 1) {
            document.getElementById('avgEff').innerHTML = `<span style="font-size:0.75rem;color:var(--text-secondary);">等待第2筆數據...</span>`;
            document.getElementById('avgCost').innerHTML = `<span style="font-size:0.75rem;color:var(--text-secondary);">等待第2筆數據...</span>`;
            initChart([], []);
            return;
        }

        // 計算全域平均值
        const finalEff = (totalDistance > 0) ? (totalKwhForEff / totalDistance).toFixed(3) : "0.000";
        const finalCost = (totalDistance > 0) ? (totalCostForEff / totalDistance).toFixed(2) : "0.00";

        document.getElementById('avgEff').innerHTML = finalEff + " <small>kWh/km</small>";
        document.getElementById('avgCost').innerText = "$" + finalCost;

        // 4. 生成歷史折線圖
        let chartLabels = [];
        let chartData = [];
        records.forEach(r => {
            if (r.dist > 0) {
                chartLabels.push(r.date);
                chartData.push(r.kwhKm.toFixed(3));
            }
        });
        initChart(chartLabels, chartData);
    }

    function initChart(labels, data) {
        if (effChartInstance) effChartInstance.destroy();
        if (labels.length === 0) return;
        effChartInstance = new Chart(document.getElementById('effChart').getContext('2d'), {
            type: 'line',
            data: { labels: labels, datasets: [{ label: '能耗效率', data: data, borderColor: '#e82127', backgroundColor: 'rgba(232,33,39,0.1)', fill: true, tension: 0.4 }] },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#333' }, ticks: { color: '#aaa' } }, x: { grid: { display: false }, ticks: { color: '#aaa' } } } }
        });
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA SW 成功啟動'))
                .catch(err => console.log('PWA SW 啟動失敗', err));
        });
    }

    fetchRecords();
</script>
</body>
</html>
