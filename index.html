<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Charging Analytics</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --tesla-red: #e82127;
            --bg-dark: #111111;
            --card-bg: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #2c2c2e;
            --border: #3a3a3c;
            --success: #30d158;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--accent);
        }
        header h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
        header h1 span { color: var(--tesla-red); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border); text-align: center;
        }
        .stat-card i { color: var(--tesla-red); margin-bottom: 10px; font-size: 1.2rem; }
        .stat-card h3 { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .stat-card p { font-size: 1.4rem; font-weight: bold; }

        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 25px;
            border: 1px solid var(--border); margin-bottom: 25px;
        }
        .card-title { font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .form-group input {
            width: 100%; background: var(--bg-dark); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 8px; outline: none;
        }
        .form-group input:focus { border-color: var(--tesla-red); }

        button {
            width: 100%; background: var(--tesla-red); color: white; border: none;
            padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); }

        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 600px;}
        th { text-align: left; color: var(--text-secondary); padding: 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 15px 12px; border-bottom: 1px solid var(--accent); white-space: nowrap;}
        .red-text { color: var(--tesla-red); font-weight: bold; }
        .delete-btn { width: auto; padding: 5px 10px; background: transparent; border: 1px solid var(--tesla-red); color: var(--tesla-red); font-size: 0.75rem; }
        .delete-btn:hover { background: var(--tesla-red); color: white; }

        canvas { max-height: 300px; width: 100% !important; }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000; display: none;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--tesla-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top: 15px;">同步雲端數據...</p>
</div>

<div class="container">
    <header>
        <h1>Tesla <span>Charge</span> Hub</h1>
        <div id="syncStatus" style="font-size: 0.8rem; color: var(--success);">● 數據已完全同步</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><i class="fa-solid fa-road"></i><h3>總行駛里程</h3><p id="totalDist">0 km</p></div>
        <div class="stat-card"><i class="fa-solid fa-bolt"></i><h3>平均耗能</h3><p id="avgEff">0.000 <small>kWh/km</small></p></div>
        <div class="stat-card"><i class="fa-solid fa-hand-holding-dollar"></i><h3>總充電支出</h3><p id="totalSpend">$0</p></div>
        <div class="stat-card"><i class="fa-solid fa-coins"></i><h3>每公里成本</h3><p id="avgCost">$0.00</p></div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-plus-circle"></i> 新增紀錄</div>
                <form id="chargeForm">
                    <div class="form-group"><label>紀錄日期</label><input type="date" id="date" required></div>
                    <div class="form-group"><label>當前總里程 (km)</label><input type="number" id="odometer" placeholder="12500" required></div>
                    <div class="form-group"><label>充入電量 (kWh)</label><input type="number" id="kwh" step="0.1" placeholder="45.5" required></div>
                    <div class="form-group"><label>增加百分比 (%)</label><input type="number" id="percent" placeholder="65" required></div>
                    <div class="form-group"><label>充電費用 ($)</label><input type="number" id="cost" step="0.1" placeholder="120" required></div>
                    <button type="submit">確認儲存</button>
                </form>
            </div>
            <div class="card"><div class="card-title"><i class="fa-solid fa-chart-line"></i> 耗能趨勢趨勢</div><canvas id="effChart"></canvas></div>
        </div>
        <div class="right-col">
            <div class="card" style="min-height: 600px;">
                <div class="card-title"><i class="fa-solid fa-history"></i> 歷史紀錄明細</div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>日期</th><th>總里程</th><th>區間里程</th><th>電量</th><th>費用</th><th>kWh/km</th><th>$/km</th><th>操作</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ 請在此處貼上您從新 Google 帳號部署取得的網頁應用程式網址 (Web App URL)
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz0yDGROFejv7Me37zolVjPB1C3tf9m11VRc7YevP1sjx-N0ZiLsRYyKTC4wnxv9zoM/exec';
    
    let records = [];
    let effChartInstance = null;

    document.getElementById('date').valueAsDate = new Date();

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    async function fetchRecords() {
        if (!WEB_APP_URL.startsWith('http')) return;
        showLoading(true);
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            // 安全防禦解析：將字串轉為數字，並過濾掉試算表中的空行與殘留錯誤
            records = data.map(r => ({
                id: Number(r.ID), date: r.Date, odometer: Number(r.Odometer),
                kwh: Number(r.kWh), percent: Number(r.Percent), cost: Number(r.Cost)
            })).filter(r => !isNaN(r.odometer) && r.odometer > 0)
               .sort((a, b) => a.odometer - b.odometer);
               
            updateDashboard();
        } catch (e) { console.error("讀取失敗:", e); }
        showLoading(false);
    }

    async function sendData(payload) {
        showLoading(true);
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            setTimeout(fetchRecords, 1500);
        } catch (e) { console.error("發送失敗:", e); showLoading(false); }
    }

    document.getElementById('chargeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        sendData({
            action: 'add', id: Date.now(),
            date: document.getElementById('date').value,
            odometer: parseFloat(document.getElementById('odometer').value),
            kwh: parseFloat(document.getElementById('kwh').value),
            percent: parseFloat(document.getElementById('percent').value),
            cost: parseFloat(document.getElementById('cost').value)
        });
        this.reset(); document.getElementById('date').valueAsDate = new Date();
    });

    function deleteRecord(id) { if(confirm('確定要刪除此筆雲端紀錄？')) sendData({ action: 'delete', id: id }); }

    function updateDashboard() {
        const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
        let totalDistance = 0, totalSpend = 0, totalKwhForEff = 0, totalCostForEff = 0;
        let chartLabels = [], chartData = [];

        if (records.length > 0) {
            // 修正：總充電支出必須涵蓋所有紀錄，使用全域精準加總
            totalSpend = records.reduce((sum, r) => sum + r.cost, 0);
            
            // 總行駛里程 = 最後一筆里程 - 第一筆里程
            if (records.length > 1) {
                totalDistance = records[records.length-1].odometer - records[0].odometer;
            }

            // 反轉矩陣以在畫面上「最新日期顯示在最上方」
            const reversed = [...records].reverse();
            reversed.forEach((record) => {
                const originalIdx = records.findIndex(r => r.id === record.id);
                const prev = originalIdx > 0 ? records[originalIdx - 1] : null;
                
                let dist = 0, kwhKm = 0, costKm = 0;
                if(prev) {
                    dist = record.odometer - prev.odometer;
                    if (dist > 0) {
                        kwhKm = record.kwh / dist; 
                        costKm = record.cost / dist;
                        
                        // 累積區間耗能與區間花費，用來推算真實的平均消耗
                        totalKwhForEff += record.kwh; 
                        totalCostForEff += record.cost;
                        
                        chartLabels.unshift(record.date); 
                        chartData.unshift(kwhKm.toFixed(3));
                    }
                }
                tbody.innerHTML += `<tr>
                    <td>${record.date}</td>
                    <td>${record.odometer.toLocaleString()} km</td>
                    <td class="red-text">${dist > 0 ? dist.toLocaleString() + ' km' : '-'}</td>
                    <td>${record.kwh} kWh</td>
                    <td>$${record.cost.toLocaleString()}</td>
                    <td>${kwhKm > 0 ? kwhKm.toFixed(3) : '-'}</td>
                    <td>${costKm > 0 ? '$' + costKm.toFixed(2) : '-'}</td>
                    <td><button class="delete-btn" onclick="deleteRecord(${record.id})">刪除</button></td>
                </tr>`;
            });
        }
        
        // 更新上方統計卡片（加入防呆與千分位逗號）
        document.getElementById('totalDist').innerText = totalDistance.toLocaleString() + " km";
        document.getElementById('totalSpend').innerText = "$" + totalSpend.toLocaleString(undefined, {maximumFractionDigits:1});
        
        const finalEff = (totalDistance > 0) ? (totalKwhForEff / totalDistance).toFixed(3) : "0.000";
        const finalCost = (totalDistance > 0) ? (totalCostForEff / totalDistance).toFixed(2) : "0.00";
        
        document.getElementById('avgEff').innerHTML = finalEff + " <small>kWh/km</small>";
        document.getElementById('avgCost').innerText = "$" + finalCost;
        
        initChart(chartLabels, chartData);
    }

    function initChart(labels, data) {
        if (effChartInstance) effChartInstance.destroy();
        effChartInstance = new Chart(document.getElementById('effChart').getContext('2d'), {
            type: 'line',
            data: { labels: labels, datasets: [{ label: '耗能效率', data: data, borderColor: '#e82127', backgroundColor: 'rgba(232,33,39,0.1)', fill: true, tension: 0.4 }] },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#333' }, ticks: { color: '#aaa' } }, x: { grid: { display: false }, ticks: { color: '#aaa' } } } }
        });
    }

    // PWA Service Worker 註冊機制
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA SW 註冊成功'))
                .catch(err => console.log('PWA SW 註冊失敗', err));
        });
    }

    fetchRecords();
</script>
</body>
</html>
