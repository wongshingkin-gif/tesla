<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Charging Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --tesla-red: #e82127;
            --bg-dark: #111111;
            --card-bg: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #2c2c2e;
            --border: #3a3a3c;
            --success: #30d158;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--accent);
        }
        header h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
        header h1 span { color: var(--tesla-red); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-card i { color: var(--tesla-red); margin-bottom: 10px; font-size: 1.2rem; }
        .stat-card h3 { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .stat-card p { font-size: 1.5rem; font-weight: bold; }

        /* Main Content Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        /* Forms */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }
        .card-title { font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .form-group input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }
        .form-group input:focus { border-color: var(--tesla-red); }

        button {
            width: 100%;
            background: var(--tesla-red);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); }

        /* Table Area */
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; color: var(--text-secondary); padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 12px; border-bottom: 1px solid var(--accent); }
        .red-text { color: var(--tesla-red); font-weight: bold; }
        .delete-btn { width: auto; padding: 5px 10px; background: transparent; border: 1px solid var(--tesla-red); color: var(--tesla-red); font-size: 0.75rem; }
        .delete-btn:hover { background: var(--tesla-red); color: white; }

        /* Chart Canvas */
        canvas { max-height: 300px; width: 100% !important; }

        /* Loading */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; display: none;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--tesla-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top: 15px;">同步雲端數據...</p>
</div>

<div class="container">
    <header>
        <h1>Tesla <span>Charge</span> Hub</h1>
        <div id="syncStatus" style="font-size: 0.8rem; color: var(--success);">● 已連線至雲端</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <i class="fa-solid fa-road"></i>
            <h3>總行駛里程</h3>
            <p id="totalDist">0 km</p>
        </div>
        <div class="stat-card">
            <i class="fa-solid fa-bolt"></i>
            <h3>平均耗能</h3>
            <p id="avgEff">0 <small>kWh/km</small></p>
        </div>
        <div class="stat-card">
            <i class="fa-solid fa-hand-holding-dollar"></i>
            <h3>總充電支出</h3>
            <p id="totalSpend">$0</p>
        </div>
        <div class="stat-card">
            <i class="fa-solid fa-coins"></i>
            <h3>每公里成本</h3>
            <p id="avgCost">$0</p>
        </div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-plus-circle"></i> 新增充電紀錄</div>
                <form id="chargeForm">
                    <div class="form-group">
                        <label>紀錄日期</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>當前總里程 (Odometer km)</label>
                        <input type="number" id="odometer" placeholder="12500" required>
                    </div>
                    <div class="form-group">
                        <label>充入電量 (kWh)</label>
                        <input type="number" id="kwh" step="0.1" placeholder="45.5" required>
                    </div>
                    <div class="form-group">
                        <label>增加百分比 (%)</label>
                        <input type="number" id="percent" placeholder="65" required>
                    </div>
                    <div class="form-group">
                        <label>充電費用 ($ HKD/TWD)</label>
                        <input type="number" id="cost" step="0.1" placeholder="120" required>
                    </div>
                    <button type="submit">確認儲存</button>
                </form>
            </div>

            <div class="card">
                <div class="card-title"><i class="fa-solid fa-chart-line"></i> 耗能趨勢分析</div>
                <canvas id="effChart"></canvas>
            </div>
        </div>

        <div class="right-col">
            <div class="card" style="min-height: 600px;">
                <div class="card-title"><i class="fa-solid fa-history"></i> 歷史紀錄明細</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>總里程</th>
                                <th>間隔里程</th>
                                <th>電量</th>
                                <th>費用</th>
                                <th>kWh/km</th>
                                <th>$/km</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ 請填入您的 Web App URL
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw8VUOGiHJkGCy-mvDtrdRUw1pD-oYWU1rQ5V5ugo2p4U7Nhh7E5RbvYYuIFQ0BXwfs/exec';
    
    let records = [];
    let effChartInstance = null;

    document.getElementById('date').valueAsDate = new Date();

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    async function fetchRecords() {
        if (!WEB_APP_URL.startsWith('http')) {
            alert("請先設定 WEB_APP_URL！");
            return;
        }
        showLoading(true);
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            records = data.map(r => ({
                id: Number(r.ID), date: r.Date, odometer: Number(r.Odometer),
                kwh: Number(r.kWh), percent: Number(r.Percent), cost: Number(r.Cost)
            })).sort((a, b) => a.odometer - b.odometer);
            
            updateDashboard();
        } catch (e) {
            console.error(e);
        }
        showLoading(false);
    }

    async function sendData(payload) {
        showLoading(true);
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // 解決某些環境的 CORS
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            // 因為 no-cors 無法獲取回應，我們等待一秒後重新獲取
            setTimeout(fetchRecords, 1500);
        } catch (e) {
            console.error(e);
            showLoading(false);
        }
    }

    document.getElementById('chargeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = {
            action: 'add',
            id: Date.now(),
            date: document.getElementById('date').value,
            odometer: parseFloat(document.getElementById('odometer').value),
            kwh: parseFloat(document.getElementById('kwh').value),
            percent: parseFloat(document.getElementById('percent').value),
            cost: parseFloat(document.getElementById('cost').value)
        };
        sendData(payload);
        this.reset();
        document.getElementById('date').valueAsDate = new Date();
    });

    function deleteRecord(id) {
        if(confirm('確定要刪除此筆雲端紀錄？')) {
            sendData({ action: 'delete', id: id });
        }
    }

    function updateDashboard() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        let totalDistance = 0;
        let totalKwh = 0;
        let totalCost = 0;
        let chartLabels = [];
        let chartData = [];

        if (records.length > 0) {
            totalDistance = records[records.length-1].odometer - records[0].odometer;
            
            const reversed = [...records].reverse();
            reversed.forEach((record, idx) => {
                const originalIdx = records.findIndex(r => r.id === record.id);
                const prev = originalIdx > 0 ? records[originalIdx - 1] : null;
                
                let dist = 0, kwhKm = 0, costKm = 0;
                if(prev) {
                    dist = record.odometer - prev.odometer;
                    kwhKm = record.kwh / dist;
                    costKm = record.cost / dist;
                    totalKwh += record.kwh;
                    totalCost += record.cost;
                    
                    // 圖表數據 (只取有計算值的)
                    chartLabels.unshift(record.date);
                    chartData.unshift(kwhKm.toFixed(3));
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${record.date}</td>
                        <td>${record.odometer}</td>
                        <td class="red-text">${dist || '-'}</td>
                        <td>${record.kwh}</td>
                        <td>$${record.cost}</td>
                        <td>${kwhKm ? kwhKm.toFixed(3) : '-'}</td>
                        <td>${costKm ? '$' + costKm.toFixed(2) : '-'}</td>
                        <td><button class="delete-btn" onclick="deleteRecord(${record.id})">刪除</button></td>
                    </tr>
                `;
            });
        }

        // 更新統計卡片
        document.getElementById('totalDist').innerText = totalDistance + " km";
        document.getElementById('totalSpend').innerText = "$" + totalCost.toFixed(0);
        document.getElementById('avgEff').innerHTML = (totalDistance > 0 ? (totalKwh/totalDistance).toFixed(3) : "0") + " <small>kWh/km</small>";
        document.getElementById('avgCost').innerText = "$" + (totalDistance > 0 ? (totalCost/totalDistance).toFixed(2) : "0");

        initChart(chartLabels, chartData);
    }

    function initChart(labels, data) {
        const ctx = document.getElementById('effChart').getContext('2d');
        if (effChartInstance) effChartInstance.destroy();
        
        effChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '耗能 (kWh/km)',
                    data: data,
                    borderColor: '#e82127',
                    backgroundColor: 'rgba(232, 33, 39, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#aaa' } },
                    x: { grid: { display: false }, ticks: { color: '#aaa' } }
                }
            }
        });
    }

    fetchRecords();
</script>

</body>
</html>
